<svg width="1200" height="280" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0B0F"/>
      <stop offset="100%" stop-color="#0D0C16"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#818CF8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="frameLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0"/>
      <stop offset="50%" stop-color="#818CF8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#FFFFFF" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
    <filter id="blurA" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
    <filter id="blurB" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
  </defs>

  <rect width="1200" height="280" fill="url(#bg)"/>
  <rect width="1200" height="280" fill="url(#grid)"/>

  <circle cx="180" cy="70" r="180" fill="url(#glow1)" filter="url(#blurA)"/>
  <circle cx="1040" cy="220" r="150" fill="url(#glow2)" filter="url(#blurA)"/>
  <circle cx="600" cy="30" r="90" fill="url(#glow2)" filter="url(#blurB)" opacity="0.5"/>

  <!-- fine orbit rings, purely decorative -->
  <g opacity="0.18" stroke="#818CF8" fill="none" stroke-width="1">
    <ellipse cx="960" cy="90" rx="150" ry="60" transform="rotate(-18 960 90)"/>
    <ellipse cx="960" cy="90" rx="210" ry="85" transform="rotate(-18 960 90)"/>
  </g>

  <!-- node accents -->
  <g fill="#A5B4FC">
    <circle cx="1108" cy="66" r="3"/>
    <circle cx="905" cy="132" r="2.5"/>
    <circle cx="70" cy="210" r="2.5"/>
    <circle cx="120" cy="240" r="2"/>
  </g>

  <!-- top and bottom hairline frame -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#frameLine)"/>
  <rect x="0" y="278" width="1200" height="2" fill="url(#frameLine)"/>
</svg>
