<svg width="400" height="420" viewBox="0 0 400 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="fill" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0.12"/>
    </radialGradient>
    <filter id="nodeGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="400" height="420" fill="#0B0B0F" rx="14"/>

  <!-- grid rings -->
  <g fill="none" stroke="#818CF8" stroke-opacity="0.18">
    <polygon points="200,163.3 240.4,186.7 240.4,233.3 200,256.7 159.6,233.3 159.6,186.7"/>
    <polygon points="200,116.7 280.8,163.3 280.8,256.7 200,303.3 119.2,256.7 119.2,163.3"/>
    <polygon points="200,70 321.2,140 321.2,280 200,350 78.8,280 78.8,140"/>
  </g>

  <!-- axis lines -->
  <g stroke="#818CF8" stroke-opacity="0.18">
    <line x1="200" y1="210" x2="200" y2="70"/>
    <line x1="200" y1="210" x2="321.2" y2="140"/>
    <line x1="200" y1="210" x2="321.2" y2="280"/>
    <line x1="200" y1="210" x2="200" y2="350"/>
    <line x1="200" y1="210" x2="78.8" y2="280"/>
    <line x1="200" y1="210" x2="78.8" y2="140"/>
  </g>

  <!-- data polygon -->
  <polygon points="200,84 315.2,143.5 303.1,269.5 200,322 109.1,262.5 115.1,161"
    fill="url(#fill)" stroke="#A5B4FC" stroke-width="1.75"/>

  <!-- nodes -->
  <g fill="#E0E7FF" filter="url(#nodeGlow)">
    <circle cx="200" cy="84" r="3.5"/>
    <circle cx="315.2" cy="143.5" r="3.5"/>
    <circle cx="303.1" cy="269.5" r="3.5"/>
    <circle cx="200" cy="322" r="3.5"/>
    <circle cx="109.1" cy="262.5" r="3.5"/>
    <circle cx="115.1" cy="161" r="3.5"/>
  </g>

  <!-- labels -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#C7CAD1">
    <text x="200" y="42" text-anchor="middle">AI Agents / RAG <tspan fill="#818CF8">90%</tspan></text>
    <text x="332" y="126" text-anchor="start">Full Stack <tspan fill="#818CF8">95%</tspan></text>
    <text x="332" y="296" text-anchor="start">NLP / Speech <tspan fill="#818CF8">85%</tspan></text>
    <text x="200" y="388" text-anchor="middle">ML / DL <tspan fill="#818CF8">80%</tspan></text>
    <text x="68" y="296" text-anchor="end">Cybersecurity <tspan fill="#818CF8">75%</tspan></text>
    <text x="68" y="126" text-anchor="end">Computer Vision <tspan fill="#818CF8">70%</tspan></text>
  </g>
</svg>
